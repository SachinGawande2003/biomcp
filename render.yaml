services:
  - type: web
    name: heuris-biomcp
    env: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: BIOMCP_TRANSPORT=http BIOMCP_HTTP_PORT=$PORT python -m biomcp
    healthCheckPath: /healthz
    envVars:
      - key: BIOMCP_TRANSPORT
        value: http
      - key: BIOMCP_HTTP_PORT
        value: 10000
      - key: BIOMCP_LOG_LEVEL
        value: INFO
      - key: PYTHON_VERSION
        value: "3.11"
