services:
  - type: web
    name: heuris-biomcp
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m biomcp.server
    envVars:
      - key: BIOMCP_TRANSPORT
        value: http
      - key: BIOMCP_HTTP_PORT
        value: 10000
      - key: BIOMCP_LOG_LEVEL
        value: DEBUG
      - key: PYTHON_VERSION
        value: "3.11"